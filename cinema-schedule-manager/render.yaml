services:
  - type: web
    name: cinema-schedule-manager-backend
    runtime: node
    rootDir: packages/backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_PATH
        value: /opt/render/project/data/cinema-schedule.db
      - key: CORS_ORIGIN
        sync: false  # Vercelのフロントエンドデプロイ後にダッシュボードで設定する
      - key: SCHEDULER_INTERVAL_MINUTES
        value: 60
    disk:
      name: cinema-db
      mountPath: /opt/render/project/data
      sizeGB: 1
